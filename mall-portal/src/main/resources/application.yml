spring:
  application:
    name: mall-portal
  profiles:
    active: dev
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis:
  mapper-locations:
    - classpath:dao/*.xml
    - classpath*:com/**/mapper/*.xml

jwt:
  tokenHeader: Authorization
  secret: ${MALL_PORTAL_JWT_SECRET:mall-portal-dev-secret}
  expiration: 604800
  tokenHead: 'Bearer '

secure:
  ignored:
    urls:
      - /swagger-ui/
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**
      - /*/*.html
      - /*/*.js
      - /*/*.css
      - /*/*.png
      - /favicon.ico
      - /sso/**
      - /home/**
      - /product/**
      - /brand/**
      - /alipay/notify

cors:
  allowed-origins: http://localhost:8060,http://127.0.0.1:8060,http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    doc-expansion: 'none'
  api-docs:
    path: /v3/api-docs
    enabled: true
  group-configs:
    - group: 'mall-portal'
      packages-to-scan: com.macro.mall.portal.controller

redis:
  database: mall
  key:
    authCode: 'ums:authCode'
    orderId: 'oms:orderId'
    member: 'ums:member'
  expire:
    authCode: 90
    common: 86400
    hot-data: 300
    hot-data-random-bound: 120

mongo:
  insert:
    sqlEnable: true

mall:
  demo:
    registration-enabled: false
    password-reset-enabled: false
    auth-code: "123456"
  payment:
    mock-only: true
    mock-pay-enabled: true
  seckill:
    baseline-enabled: false
    mq-confirm-timeout-ms: 3000
  ai:
    enabled: true
    provider: mock
    api-key: ${AI_API_KEY:}
    base-url:
    model:
    timeout-millis: 5000
    max-context-count: 6
    max-tokens: 800

rabbitmq:
  queue:
    name:
      cancelOrder: cancelOrderQueue
