server:
  port: 8085

spring:
  datasource:
    url: ${MALL_DB_URL:jdbc:mysql://db:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false}
    username: ${MALL_DB_USERNAME}
    password: ${MALL_DB_PASSWORD}
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        login-username: ${DRUID_USERNAME}
        login-password: ${DRUID_PASSWORD}
  data:
    mongodb:
      host: ${MONGO_HOST:mongo}
      port: ${MONGO_PORT:27017}
      database: ${MONGO_DATABASE:mall-port}
    redis:
      host: ${REDIS_HOST:redis}
      database: ${REDIS_DATABASE:0}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 300ms
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbit}
    port: ${RABBITMQ_PORT:5672}
    virtual-host: ${RABBITMQ_VHOST:/mall}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}

jwt:
  secret: ${MALL_PORTAL_JWT_SECRET}

mongo:
  insert:
    sqlEnable: true

logging:
  file:
    path: /var/logs
  level:
    root: info
    com.macro.mall: info

logstash:
  host: ${LOGSTASH_HOST:logstash}

mall:
  payment:
    mock-only: true
    mock-pay-enabled: false

alipay:
  gatewayUrl: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
  appId: ${ALIPAY_APP_ID}
  alipayPublicKey: ${ALIPAY_PUBLIC_KEY}
  appPrivateKey: ${ALIPAY_PRIVATE_KEY}
  returnUrl: ${ALIPAY_RETURN_URL}
  notifyUrl: ${ALIPAY_NOTIFY_URL:}
