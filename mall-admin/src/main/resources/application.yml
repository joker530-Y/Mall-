spring:
  application:
    name: mall-admin
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

mybatis:
  mapper-locations:
    - classpath:dao/*.xml
    - classpath*:com/**/mapper/*.xml

jwt:
  tokenHeader: Authorization
  secret: ${MALL_ADMIN_JWT_SECRET:mall-admin-dev-secret}
  expiration: 604800
  tokenHead: 'Bearer '

redis:
  database: mall
  key:
    admin: 'ums:admin'
    resourceList: 'ums:resourceList'
  expire:
    common: 86400

secure:
  ignored:
    urls:
      - /swagger-ui/
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**
      - /*/*.html
      - /*/*.js
      - /*/*.css
      - /*/*.png
      - /favicon.ico
      - /admin/login

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    doc-expansion: 'none'
  api-docs:
    path: /v3/api-docs
    enabled: true
  group-configs:
    - group: 'default'
      packages-to-scan: com.macro.mall.controller
  default-flat-param-object: false

aliyun:
  oss:
    endpoint: oss-cn-shenzhen.aliyuncs.com
    accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:test}
    accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:test}
    bucketName: macro-oss
    policy:
      expire: 300
    maxSize: 10
    callback: http://localhost:8080/aliyun/oss/callback
    dir:
      prefix: mall/images/
